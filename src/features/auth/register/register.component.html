<div class="register-container">
  <div class="register-wrapper">
    <div class="card bg-dark border-secondary register-card">
      <div class="card-body">
        <h2 class="card-title text-center text-light mb-4">Register</h2>

        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="alert alert-success" role="alert">
          {{ successMessage }}
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
          <div class="mb-3">
            <label for="username" class="form-label text-light">Username</label>
            <input
              type="text"
              class="form-control bg-dark border-secondary text-light"
              id="username"
              formControlName="username"
              placeholder="Enter your username (3-50 characters)"
              [class.is-invalid]="isFieldInvalid('username')"
            />
            <div class="invalid-feedback" *ngIf="isFieldInvalid('username')">
              {{ getFieldError('username') }}
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label text-light">Password</label>
            <input
              type="password"
              class="form-control bg-dark border-secondary text-light"
              id="password"
              formControlName="password"
              placeholder="Enter your password (minimum 6 characters)"
              [class.is-invalid]="isFieldInvalid('password')"
            />
            <div class="invalid-feedback" *ngIf="isFieldInvalid('password')">
              {{ getFieldError('password') }}
            </div>
          </div>

          <div class="mb-3">
            <label for="confirmPassword" class="form-label text-light">Confirm Password</label>
            <input
              type="password"
              class="form-control bg-dark border-secondary text-light"
              id="confirmPassword"
              formControlName="confirmPassword"
              placeholder="Confirm your password"
              [class.is-invalid]="isFieldInvalid('confirmPassword') || registerForm.errors?.['passwordMismatch']"
            />
            <div class="invalid-feedback" *ngIf="isFieldInvalid('confirmPassword')">
              Confirm password is required
            </div>
            <div class="invalid-feedback" *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched">
              Passwords do not match
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100 mb-3"
            [disabled]="registerForm.invalid || isLoading"
          >
            <span *ngIf="!isLoading">Register</span>
            <span *ngIf="isLoading">
              <span
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              Registering...
            </span>
          </button>
        </form>

        <p class="text-center text-light mt-3">
          Already have an account?
          <a href="#" class="link-primary" (click)="navigateToLogin($event)">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
