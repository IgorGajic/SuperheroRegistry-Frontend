<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <button class="nav-link active" aria-current="page" (click)="onHome()">Home</button>
        </li>
        @if (loggedUser) {
          <li class="nav-item">
            <button class="nav-link active" aria-current="page" (click)="onMyHeroes()">
              My Heroes
            </button>
          </li>
        }
      </ul>
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        @if (!loggedUser) {
          <li class="nav-item">
            <button class="nav-link" (click)="onLogin()">Login</button>
          </li>
        } @else {
          <li class="nav-item">
            <span class="nav-link">{{ loggedUser.username }}</span>
          </li>
          <li class="nav-item">
            <button *ngIf="loggedUser" class="nav-link" (click)="onLogout()">Logout</button>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
